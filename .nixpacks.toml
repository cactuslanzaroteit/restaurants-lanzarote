[phases.setup]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[build.args]
NODE_VERSION = "18"

[build.env]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"

[[build.packages]]
apt = ["curl", "git"]

[[build.packages]]
node = "18"

[build.node]
install-cmd = "npm ci"
build-cmd = "npm run build"
start-cmd = "npm start"