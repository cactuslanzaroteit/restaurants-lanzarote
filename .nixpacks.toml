[phases.setup]
cmds = ["cd website && npm ci"]

[phases.build]
cmds = ["cd website && npm run build"]

[start]
cmd = "cd website && npm start"

[build.args]
NODE_VERSION = "18"

[build.env]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"

[[build.packages]]
apt = ["curl", "git"]

[[build.packages]]
node = "18"

[build.node]
install-cmd = "cd website && npm ci"
build-cmd = "cd website && npm run build"
start-cmd = "cd website && npm start"